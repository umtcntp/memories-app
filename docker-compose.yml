services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memories-backend
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/credentials.json:/app/credentials.json
      - ./backend/token.json:/app/token.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5050
    container_name: memories-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
